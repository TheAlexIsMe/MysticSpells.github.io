<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mystic Spells – Location</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="https://i.imgur.com/6NZVG2f.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: "Montserrat", sans-serif;
    background: radial-gradient(circle at center,#3c1a6e 0%,#1f1238 40%,#0d0818 80%,#000 100%);
    color: #e9ddff;
    text-align: center;
  }

  .container { max-width: 1200px; margin: auto; padding: 20px; }

  /* HERO */
  .hero {
    padding: 80px 20px 60px;
    position: relative;
  }
  .hero::before {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    width: 420px; height: 420px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(164,124,243,0.45), rgba(0,0,0,0));
    border-radius: 50%; filter: blur(40px); z-index: -1;
  }
  .logo { width: 160px; margin: 0 auto 20px; display: block; }
  h1 { font-size: 52px; margin-bottom: 10px; color: #f2e6ff; }
  p.subtitle { font-size: 22px; max-width: 700px; margin: 0 auto 35px; color: #e8d8ff; }

  /* BUTTON ROW */
  .button-row {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 14px; margin-bottom: 40px;
  }
  .btn {
    border: none; width: 10em; height: 3.5em; border-radius: 2em;
    display: flex; justify-content: center; align-items: center;
    background: #1C1A1C; cursor: pointer; transition: all 450ms ease-in-out;
    text-decoration: none;
  }
  .text { font-weight: 600; color: #FFFFFF; font-size: 18px; }
  .btn:hover {
    background: linear-gradient(0deg,#A47CF3,#683FEA);
    box-shadow: inset 0px 1px 0px rgba(255,255,255,0.4),
                inset 0px -4px 0px rgba(0,0,0,0.2),
                0px 0px 0px 4px rgba(255,255,255,0.2),
                0px 0px 180px #9917FF;
    transform: translateY(-2px);
  }

  /* LOADER */
  .loader-wrapper {
    margin-top: 80px;
  }

  .three-body {
    --uib-size: 35px;
    --uib-speed: 0.8s;
    --uib-color: #A47CF3;
    position: relative;
    display: inline-block;
    height: var(--uib-size);
    width: var(--uib-size);
    animation: spin78236 calc(var(--uib-speed) * 2.5) infinite linear;
  }
  .three-body__dot {
    position: absolute;
    height: 100%;
    width: 30%;
  }
  .three-body__dot:after {
    content: '';
    position: absolute;
    height: 0%;
    width: 100%;
    padding-bottom: 100%;
    background-color: var(--uib-color);
    border-radius: 50%;
  }

  /* MAP CARD — NOW HUGE */
  .map-card {
    display: none;
    margin-top: 60px;
    position: relative;
    width: 100%;
    max-width: 900px; /* BIGGER */
    height: auto;
    margin-left: auto;
    margin-right: auto;
    border-radius: 25px;
    overflow: hidden;
  }

  .map-bg {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    bottom: 10px;
    background: rgba(30, 20, 50, 0.7);
    backdrop-filter: blur(22px);
    border-radius: 20px;
    outline: 2px solid rgba(255,255,255,0.25);
    z-index: 2;
  }

  .map-blob {
    position: absolute;
    z-index: 1;
    top: 50%;
    left: 50%;
    width: 380px;   /* BIGGER GLOW */
    height: 380px;  /* BIGGER GLOW */
    border-radius: 50%;
    background-color: #A47CF3;
    opacity: 0.55;
    filter: blur(45px);
    animation: blob-bounce 6s infinite ease-in-out;
  }

  @keyframes blob-bounce {
    0%   { transform: translate(-100%, -100%); }
    25%  { transform: translate(0%, -100%); }
    50%  { transform: translate(0%, 0%); }
    75%  { transform: translate(-100%, 0%); }
    100% { transform: translate(-100%, -100%); }
  }

  .map-gif {
    width: 100%;
    border-radius: 20px;
    z-index: 3;
    position: relative;
  }

  .location-text {
    margin-top: 25px;
    font-size: 1.3rem;
    color: #e9ddff;
    line-height: 1.7rem;
  }

  footer {
    margin-top: 60px;
    padding: 30px 0;
    color: #cfc4e8;
    font-size: 14px;
    opacity: 0.8;
  }
</style>
</head>

<body>
<div class="container">

  <!-- HERO -->
  <div class="hero">
    <img class="logo" src="https://i.imgur.com/6NZVG2f.png">
    <h1>Mystic Spells</h1>
    <p class="subtitle">A moonlit cottage of potions, tarot, and spellwork in Euphoria RP.</p>

    <div class="button-row">
      <a href="index.html" class="btn"><span class="text">Home</span></a>
      <a href="tarot.html" class="btn"><span class="text">Tarot</span></a>
      <a href="calculator.html" class="btn"><span class="text">Calculator</span></a>
      <a href="rules.html" class="btn"><span class="text">Rules</span></a>
      <a href="items.html" class="btn"><span class="text">Items</span></a>
      <a href="staff.html" class="btn"><span class="text">Staff</span></a>
    </div>
  </div>

  <!-- LOADING -->
  <div class="loader-wrapper" id="loader">
    <div class="three-body">
      <div class="three-body__dot"></div>
      <div class="three-body__dot"></div>
      <div class="three-body__dot"></div>
    </div>
    <p style="margin-top:20px; color:#cfc4e8;">Locating the cottage...</p>
  </div>

  <!-- MAP CARD -->
  <div class="map-card" id="mapCard">
    <div class="map-bg"></div>
    <div class="map-blob"></div>
    <img class="map-gif" src="https://i.imgur.com/MknltoY.gif">
  </div>

  <div class="location-text" id="locationText" style="display:none;">
    <strong>📍 Postal 568</strong><br>
    💜 Purple Heart on the map<br>
    Corner of <strong>Vinewood Blvd</strong> & <strong>Alta St</strong><br>
    Downtown Vinewood — <strong>7134</strong>
  </div>

  <footer>
    Mystic Spells © 2026 — Crafted under the moonlight.
  </footer>

</div>

<script>
setTimeout(() => {
  document.getElementById("loader").style.display = "none";
  document.getElementById("mapCard").style.display = "block";
  document.getElementById("locationText").style.display = "block";
}, 7000);
</script>

</body>
</html>
