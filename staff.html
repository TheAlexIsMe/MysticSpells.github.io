<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mystic Spells – Staff</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" href="https://i.imgur.com/6NZVG2f.png" type="image/png">

<style>
  body {
    margin: 0;
    font-family: "Montserrat", sans-serif;
    background: radial-gradient(circle at center,#3c1a6e 0%,#1f1238 40%,#0d0818 80%,#000 100%);
    color: #e9ddff;
    text-align: center;
  }

  /* HERO */
  .hero {
    padding: 60px 20px 10px;
    position: relative;
  }

  .hero::before {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    width: 420px; height: 420px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(164,124,243,0.45), rgba(0,0,0,0));
    border-radius: 50%;
    filter: blur(40px);
    z-index: -1;
  }

  .logo {
    width: 160px;
    margin: 0 auto 10px;
    display: block;
  }

  h1 {
    font-size: 52px;
    margin-bottom: 10px;
    color: #f2e6ff;
  }

  p.subtitle {
    font-size: 20px;
    max-width: 700px;
    margin: 0 auto 20px;
    color: #e8d8ff;
  }

  /* NAV BUTTONS */
  .button-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin-bottom: 40px;
  }

  .btn {
    border: none;
    width: 10em;
    height: 3.5em;
    border-radius: 2em;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #1C1A1C;
    cursor: pointer;
    transition: all 450ms ease-in-out;
    text-decoration: none;
  }

  .text {
    font-weight: 600;
    color: #FFFFFF;
    font-size: 18px;
  }

  .btn:hover {
    background: linear-gradient(0deg,#A47CF3,#683FEA);
    box-shadow:
      inset 0px 1px 0px rgba(255,255,255,0.4),
      inset 0px -4px 0px rgba(0,0,0,0.2),
      0px 0px 0px 4px rgba(255,255,255,0.2),
      0px 0px 180px #9917FF;
    transform: translateY(-2px);
  }

  /* STAFF GRID */
  .staff-grid {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 40px;
    padding: 40px 20px 80px;
  }

  /* CARD */
  .card {
    width: 280px;
    height: 420px;
    perspective: 1000px;
  }

  .content {
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 400ms ease;
    border-radius: 14px;
    box-shadow: 0 0 25px rgba(164,124,243,0.6);
  }

  .card:hover .content {
    transform: rotateY(180deg);
  }

  .front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 14px;
    overflow: hidden;
  }

  /* FRONT */
  .front {
    background: #120a22;
    border: 2px solid rgba(255,255,255,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 25px;
  }

  .front img {
    width: 140px;
    height: 140px;
    border-radius: 100%;
    object-fit: cover;
    border: 4px solid #A47CF3;
    box-shadow: 0 0 25px rgba(164,124,243,0.8);
  }

  .front h2 {
    margin-top: 18px;
    font-size: 26px;
    color: #f2e6ff;
  }

  .front p {
    margin-top: 6px;
    font-size: 17px;
    color: #d8caff;
  }

  .hire-date {
    margin-top: 10px;
    font-size: 14px;
    color: #bfa8ff;
  }

  .timer {
    margin-top: 6px;
    font-size: 14px;
    color: #e9ddff;
    font-weight: 600;
  }

  /* BACK */
  .back {
    background: #1a0f33;
    transform: rotateY(180deg);
    border: 2px solid rgba(255,255,255,0.15);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 25px;
    color: #e9ddff;
    font-size: 17px;
    line-height: 1.5rem;
  }

  footer {
    padding: 20px 0 10px;
    color: #cfc4e8;
    font-size: 14px;
    opacity: 0.8;
  }
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img class="logo" src="https://i.imgur.com/6NZVG2f.png" alt="Mystic Spells Logo">
  <h1>Mystic Spells Staff</h1>
  <p class="subtitle">Meet the coven members who keep the magic alive.</p>

  <div class="button-row">
    <a href="index.html" class="btn"><span class="text">Home</span></a>
    <a href="calculator.html" class="btn"><span class="text">Calculator</span></a>
    <a href="rules.html" class="btn"><span class="text">Rules</span></a>
    <a href="items.html" class="btn"><span class="text">Items</span></a>
    <a href="staff.html" class="btn"><span class="text">Staff</span></a>
    <a href="location.html" class="btn"><span class="text">Location</span></a>
  </div>
</div>

<!-- STAFF GRID -->
<div class="staff-grid">

  <!-- JAY -->
  <div class="card">
    <div class="content">

      <!-- FRONT -->
      <div class="front">
        <img src="https://i.imgur.com/yGV3T4S.png" alt="Jay">
        <h2>Jay</h2>
        <p>Shop Keeper</p>

        <div class="hire-date">Hired: 4/27/2026 — 2:56 AM CST</div>
        <div class="timer" id="jayTimer">Calculating…</div>
      </div>

      <!-- BACK -->
      <div class="back">
        <p>"Little thing about myself is I see dead people."</p>
      </div>

    </div>
  </div>

</div>

<footer>
  Mystic Spells © 2026 — Crafted under the moonlight.
</footer>

<script>
  function startEmploymentTimer(elementId, hireDateString) {
    const hireDate = new Date(hireDateString);

    function updateTimer() {
      const now = new Date();
      const diff = now - hireDate;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById(elementId).textContent =
        `${days} days, ${hours} hrs, ${minutes} min, ${seconds} sec`;
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  }

  // Jay's hire date
  startEmploymentTimer("jayTimer", "April 27, 2026 02:56:00 CST");
</script>

</body>
</html>
