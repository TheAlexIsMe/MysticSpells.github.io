<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mystic Spells – Tarot Readings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:"Montserrat",sans-serif;
background:radial-gradient(circle at center,#3c1a6e 0%,#1f1238 40%,#0d0818 80%,#000 100%);
color:#e9ddff;
overflow-x:hidden
}
#loginOverlay{
position:fixed;inset:0;
background:rgba(10,0,25,0.92);
backdrop-filter:blur(8px);
display:flex;justify-content:center;align-items:center;
z-index:9999
}
#loginOverlayInner{
background:linear-gradient(145deg,#120d1f,#1c1530);
padding:40px 30px;border-radius:20px;
box-shadow:0 0 35px rgba(164,124,243,0.4);
width:320px;text-align:center;
animation:fadeIn .6s ease
}
#loginLogo{width:120px;margin-bottom:20px}
.login-field{
background:rgba(255,255,255,0.08);
border-radius:10px;padding:10px;margin-bottom:12px
}
.login-field input{
width:100%;background:none;border:none;outline:none;
color:#fff;font-size:14px
}
#loginButton{
width:100%;padding:10px;margin-top:10px;border:none;border-radius:10px;
background:linear-gradient(135deg,#A47CF3,#683FEA);
color:white;font-weight:600;cursor:pointer;transition:.2s
}
#loginButton:hover{box-shadow:0 0 20px rgba(164,124,243,0.7)}
#loginError{margin-top:10px;color:#ff7a7a;font-size:13px;min-height:18px}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
#mainHeader{
display:flex;justify-content:space-between;align-items:center;
padding:14px 30px;
background:rgba(10,0,25,0.6);
backdrop-filter:blur(6px);
border-bottom:1px solid rgba(255,255,255,0.1)
}
#navLogo{display:flex;align-items:center;gap:10px}
#navLogo img{width:40px}
#navLogo span{font-size:20px;font-weight:600;color:#e9ddff}
#mainNav{display:flex;gap:12px}
.nav-btn{
padding:8px 16px;border-radius:999px;
border:1px solid rgba(255,255,255,0.15);
background:rgba(255,255,255,0.05);
color:#e9ddff;cursor:pointer;transition:.2s
}
.nav-btn:hover{
background:rgba(164,124,243,0.3);
box-shadow:0 0 12px rgba(164,124,243,0.5)
}
.page-section{
padding:40px 20px;
max-width:1200px;margin:0 auto
}
#tarotHero{text-align:center;margin-bottom:30px}
#tarotLogo{width:140px;margin-bottom:10px}
#tarotHero h1{font-size:42px;color:#f2e6ff}
#tarotSubtitle{
font-size:18px;color:#e8d8ff;
max-width:650px;margin:10px auto
}
#tarotNote{font-size:14px;color:#c7b8f5}
#tarotControlsCard{
background:linear-gradient(145deg,#120d1f,#1c1530);
border-radius:1.2rem;padding:20px;
box-shadow:0 0 25px rgba(164,124,243,0.25);
margin-bottom:30px
}
#tarotControlsGrid{
display:grid;
grid-template-columns:2fr 1.4fr;
gap:20px
}
@media(max-width:900px){
#tarotControlsGrid{grid-template-columns:1fr}
}
.controls-group-title{
font-size:16px;font-weight:600;margin-bottom:8px;color:#fff
}
.pill-row,.toggle-row{
display:flex;flex-wrap:wrap;gap:8px
}
.pill,.toggle-pill{
padding:7px 12px;border-radius:999px;
border:1px solid rgba(255,255,255,0.18);
background:rgba(10,8,20,0.7);
font-size:13px;cursor:pointer;color:#e9ddff;transition:.2s
}
.pill.active{
background:linear-gradient(135deg,#A47CF3,#683FEA);
box-shadow:0 0 18px rgba(164,124,243,0.6)
}
.toggle-pill.active{
background:linear-gradient(135deg,#ff7ad9,#b13cff);
box-shadow:0 0 18px rgba(255,122,217,0.7)
}
#generateBtn{
width:100%;padding:12px;border-radius:999px;border:none;
background:linear-gradient(135deg,#A47CF3,#683FEA);
color:white;font-weight:600;cursor:pointer;transition:.2s
}
#generateBtn:hover{box-shadow:0 0 25px rgba(164,124,243,0.9)}
#shuffleAnimation{
height:120px;margin:20px auto;
background:url('https://i.imgur.com/3xVJt8W.gif') center/contain no-repeat
}
#loadingAnimation{text-align:center;margin:20px 0}
.loading-circle{
width:60px;height:60px;border:4px solid rgba(255,255,255,0.2);
border-top-color:#A47CF3;border-radius:50%;
margin:0 auto;animation:spin 1s linear infinite
}
.loading-text{margin-top:10px;color:#e9ddff;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
#resultsWrapper{
display:grid;
grid-template-columns:1.4fr 1.6fr;
gap:24px
}
@media(max-width:900px){
#resultsWrapper{grid-template-columns:1fr}
}
#cardsArea,#oracleArea{
background:linear-gradient(145deg,#120d1f,#1c1530);
border-radius:1.2rem;padding:20px;
box-shadow:0 0 25px rgba(164,124,243,0.25)
}
.section-title{font-size:16px;font-weight:600;margin-bottom:8px}
.section-sub{font-size:13px;color:#cfc4e8;margin-bottom:14px}
#cardsGrid{
display:flex;flex-wrap:wrap;gap:12px;justify-content:center
}
.card-display{
width:120px;min-height:190px;border-radius:10px;
background:radial-gradient(circle at top,#3c2a6e,#120d1f);
border:1px solid rgba(255,255,255,0.18);
box-shadow:0 0 18px rgba(164,124,243,0.35);
padding:6px;text-align:center;font-size:12px;color:#f5ecff;
opacity:0;transform:translateY(10px) scale(.96);
animation:cardFadeIn .4s forwards
}
@keyframes cardFadeIn{
to{opacity:1;transform:translateY(0) scale(1)}
}
</style>
<script>
const workers={"AlexOwner":"MysticSpells2025"};

function showSection(id){
document.querySelectorAll(".page-section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

document.addEventListener("DOMContentLoaded",()=>{
const loginForm=document.getElementById("loginForm");
const loginOverlay=document.getElementById("loginOverlay");
const appWrapper=document.getElementById("appWrapper");
const loginError=document.getElementById("loginError");

loginForm.addEventListener("submit",e=>{
e.preventDefault();
let u=document.getElementById("loginUsername").value.trim();
let p=document.getElementById("loginPassword").value.trim();
if(workers[u]&&workers[u]===p){
loginOverlay.style.display="none";
appWrapper.style.display="block";
showSection("homeSection");
}else{
loginError.textContent="Invalid username or password.";
}
});

document.querySelectorAll(".nav-btn").forEach(btn=>{
btn.addEventListener("click",()=>{
let target=btn.getAttribute("data-target");
showSection(target);
});
});

document.getElementById("logoutBtn").addEventListener("click",()=>{
location.reload();
});

const generateBtn=document.getElementById("generateBtn");
const shuffleAnimation=document.getElementById("shuffleAnimation");
const loadingAnimation=document.getElementById("loadingAnimation");

generateBtn.addEventListener("click",()=>{
shuffleAnimation.style.display="block";
loadingAnimation.style.display="none";

setTimeout(()=>{
shuffleAnimation.style.display="none";
loadingAnimation.style.display="block";
},1500);
});
});
</script>
<script>
const tarotDeck=[
{n:"The Fool",s:"Major",e:"Air",num:0,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Magician",s:"Major",e:"Air",num:1,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The High Priestess",s:"Major",e:"Water",num:2,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Empress",s:"Major",e:"Earth",num:3,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Emperor",s:"Major",e:"Fire",num:4,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Hierophant",s:"Major",e:"Earth",num:5,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Lovers",s:"Major",e:"Air",num:6,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Chariot",s:"Major",e:"Water",num:7,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"Strength",s:"Major",e:"Fire",num:8,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Hermit",s:"Major",e:"Earth",num:9,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"Wheel of Fortune",s:"Major",e:"Fire",num:10,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"Justice",s:"Major",e:"Air",num:11,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Hanged Man",s:"Major",e:"Water",num:12,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"Death",s:"Major",e:"Water",num:13,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"Temperance",s:"Major",e:"Fire",num:14,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Devil",s:"Major",e:"Earth",num:15,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Tower",s:"Major",e:"Fire",num:16,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Star",s:"Major",e:"Air",num:17,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Moon",s:"Major",e:"Water",num:18,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The Sun",s:"Major",e:"Fire",num:19,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"Judgement",s:"Major",e:"Fire",num:20,i:"https://i.imgur.com/0ZQZQ0M.png"},
{n:"The World",s:"Major",e:"Earth",num:21,i:"https://i.imgur.com/0ZQZQ0M.png"}
];

const suits=["Wands","Cups","Swords","Pentacles"];
const elements={Wands:"Fire",Cups:"Water",Swords:"Air",Pentacles:"Earth"};

for(let s of suits){
for(let i=1;i<=14;i++){
let name=i===1?"Ace":i===11?"Page":i===12?"Knight":i===13?"Queen":i===14?"King":i;
tarotDeck.push({
n:`${name} of ${s}`,
s:"Minor",
e:elements[s],
num:i,
i:"https://i.imgur.com/0ZQZQ0M.png"
});
}
}

function shuffle(arr){
let a=[...arr];
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

function pickCards(deck,count,reversed){
let d=shuffle(deck);
let out=[];
for(let i=0;i<count;i++){
let c={...d[i]};
c.rev=reversed?Math.random()<0.5:false;
out.push(c);
}
return out;
}

function getReadingType(){
let a=document.querySelector(".pill-row#readingTypeRow .pill.active");
return a?a.dataset.reading:"one";
}

function getDeckType(){
let a=document.querySelector(".pill-row#deckTypeRow .pill.active");
return a?a.dataset.deck:"full";
}

function getTopic(){
let a=document.querySelector(".pill-row#topicRow .pill.active");
return a?a.dataset.topic:"general";
}

function getMode(){
let a=document.querySelector(".pill-row#modeRow .pill.active");
return a?a.dataset.mode:"ic";
}

function getShadow(){
return document.getElementById("shadowToggle").classList.contains("active");
}

function getReversed(){
return document.getElementById("reversedToggle").classList.contains("active");
}

function filterDeck(){
let t=getDeckType();
if(t==="major")return tarotDeck.filter(c=>c.s==="Major");
if(t==="minor")return tarotDeck.filter(c=>c.s==="Minor");
return tarotDeck;
}

function readingCount(type){
if(type==="one")return 1;
if(type==="truefalse")return 1;
if(type==="three")return 3;
if(type==="five")return 5;
if(type==="seven")return 7;
return 3;
}

function cardMeaning(card,topic,shadow){
let base=`${card.n} speaks to ${topic} matters.`;
if(card.s==="Major")base=`${card.n} is a major force influencing ${topic}.`;
if(shadow)base+=` Its shadow warns of hidden tension.`;
if(card.rev)base+=` Reversed, its energy twists or delays.`;
return base;
}

function synergy(cards){
if(cards.length<2)return "";
let e=cards.map(c=>c.e);
let fire=e.filter(x=>x==="Fire").length;
let water=e.filter(x=>x==="Water").length;
let air=e.filter(x=>x==="Air").length;
let earth=e.filter(x=>x==="Earth").length;
let out="";
if(fire>2)out+="Strong fire energy drives action. ";
if(water>2)out+="Emotional currents shape the reading. ";
if(air>2)out+="Thoughts and clarity dominate. ";
if(earth>2)out+="Stability and grounding influence events. ";
return out;
}

function oracle(cards,topic,mode,shadow,type){
let txt="";
for(let c of cards){
txt+=cardMeaning(c,topic,shadow)+" ";
}
txt+=synergy(cards);
if(type==="truefalse"){
let yes=cards.filter(c=>c.e==="Fire"||c.e==="Air").length;
let no=cards.filter(c=>c.e==="Water"||c.e==="Earth").length;
txt+=yes>=no?"Outcome leans toward yes. ":"Outcome leans toward no. ";
}
if(mode==="ic")txt+="This applies to your character’s path.";
else txt+="This applies to your real‑life situation.";
return txt;
}

document.addEventListener("DOMContentLoaded",()=>{
document.getElementById("generateBtn").addEventListener("click",()=>{
setTimeout(()=>{

let type=getReadingType();
let topic=getTopic();
let mode=getMode();
let shadow=getShadow();
let reversed=getReversed();

let deck=filterDeck();
let count=readingCount(type);
let cards=pickCards(deck,count,reversed);

let cg=document.getElementById("cardsGrid");
cg.innerHTML="";
cards.forEach(c=>{
let d=document.createElement("div");
d.className="card-display";
d.innerHTML=`<div>${c.n}${c.rev?" (Reversed)":""}</div>`;
cg.appendChild(d);
});

document.getElementById("oracleText").textContent=
oracle(cards,topic,mode,shadow,type);

document.getElementById("oracleModeTag").textContent="Mode: "+mode.toUpperCase();
document.getElementById("oracleTopicTag").textContent="Topic: "+topic;
document.getElementById("oracleShadowTag").textContent="Shadow: "+(shadow?"On":"Off");
document.getElementById("oracleSpreadTag").textContent="Spread: "+type;

document.getElementById("loadingAnimation").style.display="none";

},3000);
});
});
</script>
<script>
document.querySelectorAll(".pill-row .pill").forEach(p=>{
p.addEventListener("click",()=>{
p.parentElement.querySelectorAll(".pill").forEach(x=>x.classList.remove("active"));
p.classList.add("active");
});
});

document.getElementById("shadowToggle").addEventListener("click",e=>{
e.target.classList.toggle("active");
});

document.getElementById("reversedToggle").addEventListener("click",e=>{
e.target.classList.toggle("active");
});
</script>
</body>
</html>
