<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mystic Spells – Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:"Montserrat",sans-serif;
background:radial-gradient(circle at center,#3c1a6e 0%,#1f1238 40%,#0d0818 80%,#000 100%);
color:#e9ddff;
}

/* HEADER */
#header{
text-align:center;
padding:30px 0 10px 0;
}
#header img{
width:160px;
filter:drop-shadow(0 0 12px rgba(164,124,243,0.7));
}

/* NAV BAR */
#navBar{
display:flex;
justify-content:center;
gap:18px;
margin-bottom:40px;
}
.navBtn{
padding:10px 22px;
border-radius:999px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(10,0,25,0.55);
color:#e9ddff;
font-size:15px;
cursor:pointer;
transition:.25s;
backdrop-filter:blur(6px);
}
.navBtn:hover{
background:linear-gradient(135deg,#A47CF3,#683FEA);
box-shadow:0 0 20px rgba(164,124,243,0.7);
}

/* PAGE CONTENT */
#content{
max-width:1100px;
margin:0 auto;
padding:0 20px 60px 20px;
}

/* SECTION TITLES */
.sectionTitle{
font-size:24px;
font-weight:600;
margin:20px 0 10px 0;
color:#f2e6ff;
text-shadow:0 0 10px rgba(164,124,243,0.6);
}

/* TABLES */
.table{
width:100%;
border-collapse:collapse;
margin-bottom:25px;
background:rgba(255,255,255,0.05);
border-radius:14px;
overflow:hidden;
backdrop-filter:blur(6px);
}
.table th{
background:rgba(255,255,255,0.08);
padding:12px;
font-size:15px;
}
.table td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.08);
}
.table tr:last-child td{
border-bottom:none;
}
.table input{
width:70px;
padding:6px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.12);
color:white;
text-align:center;
}

/* DISCOUNT */
#discountRow{
display:flex;
align-items:center;
gap:10px;
margin:20px 0;
font-size:16px;
}

/* TOTAL + MANIFEST */
#totalBox,#manifestBox{
background:rgba(255,255,255,0.08);
padding:18px;
border-radius:14px;
margin-top:20px;
font-size:18px;
white-space:pre-line;
backdrop-filter:blur(6px);
}
#manifestBox{
font-size:16px;
min-height:120px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header">
  <img src="https://i.imgur.com/6NZVG2f.png">
</div>

<!-- NAV BAR -->
<div id="navBar">
  <button class="navBtn" onclick="location.href='tarot.html'">Tarot</button>
  <button class="navBtn" onclick="location.href='calculator.html'">Calculator</button>
  <button class="navBtn" onclick="location.href='rules.html'">Rules</button>
  <button class="navBtn" onclick="location.href='items.html'">Items</button>
  <button class="navBtn" onclick="location.href='staff.html'">Staff</button>
  <button class="navBtn" onclick="location.href='location.html'">Location</button>
</div>

<!-- MAIN CONTENT -->
<div id="content">

  <div class="sectionTitle">Singular Items</div>

  <table class="table">
    <tr><th>Item</th><th>Qty</th><th>Price</th></tr>
    <tr><td>Elixir of Renewal</td><td><input id="B3" type="number" min="0" value="0"></td><td>500</td></tr>
    <tr><td>Spectral Rush</td><td><input id="B4" type="number" min="0" value="0"></td><td>500</td></tr>
    <tr><td>Suspicious Stew</td><td><input id="B5" type="number" min="0" value="0"></td><td>500</td></tr>
    <tr><td>Blood of Enemy</td><td><input id="B6" type="number" min="0" value="0"></td><td>300</td></tr>
  </table>

  <div class="sectionTitle">Bundles</div>

  <table class="table">
    <tr><th>Bundle</th><th>Qty</th><th>Price</th></tr>
    <tr><td>UTP</td><td><input id="F3" type="number" min="0" value="0"></td><td>32000</td></tr>
    <tr><td>Pretty & Protected</td><td><input id="F4" type="number" min="0" value="0"></td><td>25000</td></tr>
    <tr><td>Midnight Moonbeam</td><td><input id="F5" type="number" min="0" value="0"></td><td>25500</td></tr>
    <tr><td>Starlight Starburst</td><td><input id="F6" type="number" min="0" value="0"></td><td>27500</td></tr>
  </table>

  <div id="discountRow">
    <input type="checkbox" id="discountToggle">
    <label for="discountToggle">PD / EMS Discount (15%)</label>
  </div>

  <div id="totalBox">Total: $0</div>
  <div id="manifestBox">✨ Waiting for order...</div>

</div>

<script>
// PRICE CONSTANTS
const PRICES = {
  B3: 500, B4: 500, B5: 500, B6: 300,
  F3: 32000, F4: 25000, F5: 25500, F6: 27500
};

const ids = ["B3","B4","B5","B6","F3","F4","F5","F6"];
const inputs = ids.map(id => document.getElementById(id));
const discountToggle = document.getElementById("discountToggle");
const totalBox = document.getElementById("totalBox");
const manifestBox = document.getElementById("manifestBox");

function updateCalculator(){
  const vals = {};
  ids.forEach(id => vals[id] = Number(document.getElementById(id).value));

  const totalInput = Object.values(vals).reduce((a,b)=>a+b,0);
  if(totalInput === 0){
    totalBox.textContent = "Total: $0";
    manifestBox.textContent = "✨ Waiting for order...";
    return;
  }

  let total = 0;
  ids.forEach(id => total += vals[id] * PRICES[id]);

  if(discountToggle.checked){
    total = Math.round(total * 0.85);
  }

  totalBox.textContent = "Total: $" + total.toLocaleString();

  const renewal = vals.B3 + (vals.F4*15) + (vals.F3*20) + (vals.F5*20);
  const rush    = vals.B4 + (vals.F6*30) + (vals.F4*35) + (vals.F3*20) + (vals.F5*10);
  const stew    = vals.B5 + (vals.F6*30) + (vals.F3*20);
  const blood   = vals.B6 + (vals.F4*10) + (vals.F3*20) + (vals.F5*40);

  manifestBox.textContent =
`📦 PACKING MANIFEST
-----------------------------------
💗 RENEWAL: ${renewal}x
⚡ RUSH: ${rush}x
🍲 STEW: ${stew}x
🩸 BLOOD: ${blood}x
-----------------------------------`;
}

inputs.forEach(i => i.addEventListener("input", updateCalculator));
discountToggle.addEventListener("change", updateCalculator);
updateCalculator();
</script>

</body>
</html>
